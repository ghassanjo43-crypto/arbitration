# Development stack. Production overrides live in docker-compose.prod.yml.
services:
  postgres:
    image: postgres:16-alpine
    container_name: gaap_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-arbitration}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-arbitration}
      POSTGRES_DB: ${POSTGRES_DB:-arbitration}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-arbitration}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gaap_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    container_name: gaap_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-arbitration}:${POSTGRES_PASSWORD:-arbitration}@postgres:5432/${POSTGRES_DB:-arbitration}?schema=public
      REDIS_URL: redis://redis:6379
    env_file:
      - .env
    ports:
      - '${API_PORT:-4000}:4000'
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages/shared:/app/packages/shared
      - api_storage:/app/storage
      - /app/node_modules

volumes:
  pgdata:
  redisdata:
  api_storage:
